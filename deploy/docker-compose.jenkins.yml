services:
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile.jenkins
    container_name: jenkins
    restart: unless-stopped
    environment:
      JENKINS_OPTS: "--prefix=/jenkins"
    ports:
      - "8080:8080"
      - "50000:50000"
    user: "jenkins:986"
    group_add:
      - "986"
    volumes:
      - /var/jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOME}/.ssh/id_ed25519:/var/jenkins_home/.ssh/id_ed25519:ro
      - ${HOME}/.ssh/id_ed25519.pub:/var/jenkins_home/.ssh/id_ed25519.pub:ro

