global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: gateway
    static_configs:
      - targets: ["gateway:8080"]
        labels:
          service: gateway
          environment: local

  - job_name: auth
    static_configs:
      - targets: ["auth:8081"]
        labels:
          service: auth
          environment: local

  - job_name: listings
    static_configs:
      - targets: ["listings:8082"]
        labels:
          service: listings
          environment: local

  - job_name: users
    static_configs:
      - targets: ["users:8083"]
        labels:
          service: users
          environment: local

  - job_name: sessions
    static_configs:
      - targets: ["sessions:8084"]
        labels:
          service: sessions
          environment: local

  - job_name: mentors
    static_configs:
      - targets: ["mentors:8085"]
        labels:
          service: mentors
          environment: local

  - job_name: notifications
    static_configs:
      - targets: ["notifications:8086"]
        labels:
          service: notifications
          environment: local

  - job_name: payments
    static_configs:
      - targets: ["payments:8087"]
        labels:
          service: payments
          environment: local

  - job_name: metrics
    static_configs:
      - targets: ["metrics:8088"]
        labels:
          service: metrics
          environment: local
